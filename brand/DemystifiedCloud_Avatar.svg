<svg viewBox="0 0 800 800" width="800" height="800" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="space" cx="50%" cy="40%" r="78%">
      <stop offset="0" stop-color="#1A2C66"/>
      <stop offset="0.55" stop-color="#0B1736"/>
      <stop offset="1" stop-color="#04060F"/>
    </radialGradient>
    <linearGradient id="neonEdge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="0.5" stop-color="#3B82F6"/>
      <stop offset="1" stop-color="#A855F7"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0" stop-color="#22D3EE"/>
      <stop offset="1" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="glass" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.28"/>
      <stop offset="0.5" stop-color="#9DB7FF" stop-opacity="0.07"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0.12"/>
    </linearGradient>
    <radialGradient id="nodeGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#67E8F9" stop-opacity="0.95"/>
      <stop offset="0.4" stop-color="#22D3EE" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#22D3EE" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="coreGlow" cx="50%" cy="45%" r="55%">
      <stop offset="0" stop-color="#3B82F6" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#3B82F6" stop-opacity="0"/>
    </radialGradient>
    <filter id="soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="8"/>
    </filter>
    <clipPath id="circ"><circle cx="400" cy="400" r="400"/></clipPath>
    <pattern id="dots" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.6" fill="#6E8BFF" fill-opacity="0.13"/>
    </pattern>
    <g id="cloud">
      <rect x="-80" y="8" width="160" height="46" rx="23"/>
      <circle cx="-48" cy="8" r="34"/>
      <circle cx="2" cy="-22" r="46"/>
      <circle cx="50" cy="6" r="32"/>
      <circle cx="8" cy="20" r="30"/>
    </g>
  </defs>

  <g clip-path="url(#circ)">
    <rect width="800" height="800" fill="url(#space)"/>
    <rect width="800" height="800" fill="url(#dots)"/>
    <circle cx="400" cy="370" r="320" fill="url(#coreGlow)"/>
    <g stroke="#22D3EE" stroke-opacity="0.18" fill="none" stroke-width="2">
      <path d="M40,210 H150 L185,175 H250"/>
      <path d="M760,560 H650 L615,595 H545"/>
      <path d="M95,640 H205 L235,610 H300"/>
      <path d="M705,235 H620 L590,265 H540"/>
    </g>
    <g fill="#22D3EE" fill-opacity="0.55">
      <circle cx="40" cy="210" r="3"/><circle cx="760" cy="560" r="3"/>
      <circle cx="95" cy="640" r="3"/><circle cx="705" cy="235" r="3"/>
    </g>
  </g>

  <!-- orbital ring -->
  <circle cx="400" cy="400" r="322" fill="none" stroke="#A855F7" stroke-opacity="0.16" stroke-width="7"/>
  <circle cx="400" cy="400" r="322" fill="none" stroke="#22D3EE" stroke-opacity="0.32" stroke-width="2"/>

  <!-- provider nodes on the ring -->
  <g>
    <circle cx="400" cy="78"  r="26" fill="url(#nodeGlow)"/><circle cx="400" cy="78"  r="12" fill="none" stroke="#22D3EE" stroke-opacity="0.6" stroke-width="2"/><circle cx="400" cy="78"  r="7" fill="#ECFEFF"/>
    <circle cx="706" cy="300" r="26" fill="url(#nodeGlow)"/><circle cx="706" cy="300" r="12" fill="none" stroke="#22D3EE" stroke-opacity="0.6" stroke-width="2"/><circle cx="706" cy="300" r="7" fill="#ECFEFF"/>
    <circle cx="589" cy="660" r="26" fill="url(#nodeGlow)"/><circle cx="589" cy="660" r="12" fill="none" stroke="#22D3EE" stroke-opacity="0.6" stroke-width="2"/><circle cx="589" cy="660" r="7" fill="#ECFEFF"/>
    <circle cx="211" cy="660" r="26" fill="url(#nodeGlow)"/><circle cx="211" cy="660" r="12" fill="none" stroke="#22D3EE" stroke-opacity="0.6" stroke-width="2"/><circle cx="211" cy="660" r="7" fill="#ECFEFF"/>
    <circle cx="94"  cy="300" r="26" fill="url(#nodeGlow)"/><circle cx="94"  cy="300" r="12" fill="none" stroke="#22D3EE" stroke-opacity="0.6" stroke-width="2"/><circle cx="94"  cy="300" r="7" fill="#ECFEFF"/>
  </g>

  <!-- glass cloud-core with neon edge -->
  <use href="#cloud" transform="translate(400,398) scale(2.36)" fill="#22D3EE" opacity="0.16" filter="url(#soft)"/>
  <use href="#cloud" transform="translate(400,398) scale(2.12)" fill="url(#neonEdge)"/>
  <use href="#cloud" transform="translate(400,398) scale(2.0)"  fill="url(#glass)" stroke="#CFFAFE" stroke-opacity="0.4" stroke-width="1.6"/>

  <!-- rising data-beam -->
  <path d="M380,500 L380,360 L344,360 L400,252 L456,360 L420,360 L420,500 Z" fill="url(#beam)" opacity="0.45" filter="url(#soft)"/>
  <path d="M384,498 L384,360 L352,360 L400,262 L448,360 L416,360 L416,498 Z" fill="url(#beam)"/>
  <line x1="400" y1="262" x2="400" y2="498" stroke="#ECFEFF" stroke-opacity="0.85" stroke-width="2.5"/>

  <!-- outer neon frame -->
  <circle cx="400" cy="400" r="392" fill="none" stroke="url(#neonEdge)" stroke-opacity="0.55" stroke-width="4"/>
  <circle cx="400" cy="400" r="382" fill="none" stroke="#0B1736" stroke-opacity="0.6" stroke-width="2"/>
</svg>
